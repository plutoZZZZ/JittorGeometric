<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JittorGeometric Web Frontend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 30px;
            text-align: center;
        }

        .logo {
            max-width: 400px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .status {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }

        .status.running {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: #1565c0;
        }

        .status.completed {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
        }

        .status.error {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
        }

        .progress {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 12px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            margin-top: 20px;
        }

        .visualization-section {
            grid-column: 1 / -1;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .visualization-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            margin-right: 10px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .graph-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.1rem;
        }

        .fusion-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/assets/JittorGeometric_logo.png" alt="JittorGeometric Logo" class="logo">
            <h1>JittorGeometric Web Frontend</h1>
            <p class="subtitle">基于Jittor的图神经网络可视化与训练平台</p>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2 style="margin-bottom: 20px; color: #333;">模型配置</h2>
                
                <div class="form-group">
                    <label for="model_name">模型选择</label>
                    <select id="model_name">
                        <option value="GCN">GCN (Graph Convolutional Network)</option>
                        <option value="GAT">GAT (Graph Attention Network)</option>
                        <option value="GraphSAGE">GraphSAGE (Graph Sample and Aggregate)</option>
                        <option value="GIN">GIN (Graph Isomorphism Network)</option>
                        <option value="GCNv2">GCNv2 (Improved Graph Convolutional Network)</option>
                        <option value="PNA">PNA (Principal Neighbourhood Aggregation)</option>
                        <option value="RGCN">RGCN (Relational Graph Convolutional Network)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dataset_name">数据集选择</label>
                    <select id="dataset_name">
                        <option value="Cora">Cora</option>
                        <option value="Citeseer">Citeseer</option>
                        <option value="Pubmed">Pubmed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hidden_dim">隐藏层维度</label>
                    <input type="number" id="hidden_dim" value="16" min="1" max="256">
                </div>

                <div class="form-group">
                    <label for="num_layers">层数</label>
                    <input type="number" id="num_layers" value="2" min="1" max="10">
                </div>

                <div class="form-group">
                    <label for="heads">注意力头数 (仅GAT)</label>
                    <input type="number" id="heads" value="8" min="1" max="16">
                </div>

                <div class="form-group">
                    <label for="dropout">Dropout率</label>
                    <input type="number" id="dropout" value="0.5" min="0.0" max="1.0" step="0.1">
                </div>

                <div class="form-group">
                    <label for="epochs">训练轮数</label>
                    <input type="number" id="epochs" value="200" min="1" max="1000">
                </div>

                <button id="train_btn">开始训练</button>
                <button id="stop-btn" disabled>停止训练</button>
            </div>

            <div class="status-section">
                <h2 style="margin-bottom: 20px; color: #333;">训练状态</h2>
                
                <div id="status" class="status">等待训练开始...</div>
            
            <div class="progress">
                <div id="progress_bar" class="progress-bar" style="width: 0%">0%</div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 20px; margin-top:20px;">
                <div class="chart-container">
                    <h3 style="margin-bottom: 10px; color: #333;">Loss曲线</h3>
                    <canvas id="loss-chart" width="800" height="300"></canvas>
                </div>
                <div class="chart-container">
                    <h3 style="margin-bottom: 10px; color: #333;">准确率曲线</h3>
                    <canvas id="acc-chart" width="800" height="300"></canvas>
                </div>
            </div>
            </div>
        </div>

        <div class="visualization-section">
            <h2 style="margin-bottom: 20px; color: #333;">可视化</h2>
            
            <div class="visualization-tabs">
                <button class="tab-btn active" data-tab="graph">计算图</button>
                <button class="tab-btn" data-tab="fusion">算子融合</button>
            </div>

            <div id="graph-tab" class="tab-content active">
                <div class="graph-container">
                    <div>
                        <h3>计算图可视化</h3>
                        <p>训练开始后将显示模型计算图</p>
                    </div>
                </div>
            </div>

            <div id="fusion-tab" class="tab-content">
                <div class="fusion-stats">
                    <div class="stat-card">
                        <div class="stat-value">0</div>
                        <div class="stat-label">融合前算子数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">0</div>
                        <div class="stat-label">融合后算子数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">0%</div>
                        <div class="stat-label">融合率</div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                
                // Remove active class from all buttons and contents
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                // Add active class to current button and content
                btn.classList.add('active');
                document.getElementById(`${tab}-tab`).classList.add('active');
            });
        });

        // Graph visualization with fusion information
        function renderGraph(graphData, fusionInfo = {}) {
            const container = document.querySelector('#graph-tab .graph-container');
            if (!graphData || !graphData.nodes) {
                container.innerHTML = '<div><h3>计算图可视化</h3><p>训练开始后将显示模型计算图</p></div>';
                return;
            }
            
            // Clear container and add title
            const edgesCount = graphData.edges ? graphData.edges.length : graphData.links ? graphData.links.length : 0;
            container.innerHTML = `<div style="margin-bottom: 20px;"><h3>计算图可视化</h3><p>节点数: ${graphData.nodes.length}, 边数: ${edgesCount}</p></div>`;
            
            // Calculate required SVG size based on node count
            const nodesPerRow = 6; // Reduce nodes per row for better spacing
            const nodeWidth = 150; // Increased width to accommodate long labels
            const nodeHeight = 80; // Increased height
            const padding = 20;
            
            const rows = Math.ceil(graphData.nodes.length / nodesPerRow);
            const svgWidth = nodesPerRow * nodeWidth + padding * 2;
            const svgHeight = rows * nodeHeight + padding * 2;
            
            // Create SVG visualization with dynamic size
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', Math.max(500, svgHeight)); // Minimum height of 500
            svg.style.background = '#f8f9fa';
            svg.style.borderRadius = '8px';
            svg.style.marginTop = '20px';
            svg.style.overflow = 'auto';
            
            // Calculate node positions
            const nodePositions = {};
            const nodeRadius = 15; // Increased node size
            
            graphData.nodes.forEach((node, index) => {
                const row = Math.floor(index / nodesPerRow);
                const col = index % nodesPerRow;
                const x = padding + col * nodeWidth + nodeWidth / 2;
                const y = padding + row * nodeHeight + nodeHeight / 2;
                
                nodePositions[node.id] = { x, y };
                
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', nodeRadius);
                
                // Color nodes based on fusion status
                const isFused = fusionInfo[node.id] && fusionInfo[node.id].includes('Fused');
                circle.setAttribute('fill', isFused ? '#f093fb' : '#667eea');
                circle.setAttribute('stroke', '#333');
                circle.setAttribute('stroke-width', '2');
                svg.appendChild(circle);
                
                // Add node label with better positioning
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', y - nodeRadius - 5);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '12'); // Increased font size for better readability
                text.setAttribute('fill', '#333');
                text.setAttribute('font-weight', '500');
                text.setAttribute('font-family', 'Arial, sans-serif'); // Academic font
                text.setAttribute('white-space', 'nowrap');
                
                // Truncate long node names
                const displayName = node.id.length > 18 ? node.id.substring(0, 18) + '...' : node.id;
                text.textContent = displayName;
                
                // Add text first to get accurate bounding box
                svg.appendChild(text);
                
                // Add background to label for better readability
                const textBBox = text.getBBox();
                const textBackground = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                textBackground.setAttribute('x', textBBox.x - 3);
                textBackground.setAttribute('y', textBBox.y - 2);
                textBackground.setAttribute('width', textBBox.width + 6);
                textBackground.setAttribute('height', textBBox.height + 4);
                textBackground.setAttribute('fill', 'rgba(255, 255, 255, 0.9)');
                textBackground.setAttribute('stroke', 'none');
                
                // Insert background before text
                svg.insertBefore(textBackground, text);
                
                // Add fusion info tooltip
                if (isFused) {
                    const tooltip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    tooltip.textContent = fusionInfo[node.id];
                    circle.appendChild(tooltip);
                }
            });
            
            // Draw edges (handle both 'edges' and 'links' formats)
            const edges = graphData.edges || graphData.links;
            edges.forEach(edge => {
                const sourcePos = nodePositions[edge.source];
                const targetPos = nodePositions[edge.target];
                
                if (sourcePos && targetPos) {
                    const x1 = sourcePos.x;
                    const y1 = sourcePos.y;
                    const x2 = targetPos.x;
                    const y2 = targetPos.y;
                    
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x1);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', x2);
                    line.setAttribute('y2', y2);
                    line.setAttribute('stroke', '#999');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-dasharray', '5,5'); // Dashed lines for better visibility
                    svg.appendChild(line);
                    
                    // Add arrowhead
                    const arrowSize = 8;
                    const angle = Math.atan2(y2 - y1, x2 - x1);
                    const arrowX = x2 - arrowSize * Math.cos(angle);
                    const arrowY = y2 - arrowSize * Math.sin(angle);
                    
                    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    const arrowPoints = [
                        x2,
                        y2,
                        arrowX - arrowSize * Math.sin(angle),
                        arrowY + arrowSize * Math.cos(angle),
                        arrowX + arrowSize * Math.sin(angle),
                        arrowY - arrowSize * Math.cos(angle)
                    ];
                    arrow.setAttribute('points', arrowPoints.join(','));
                    arrow.setAttribute('fill', '#999');
                    svg.appendChild(arrow);
                }
            });
            
            // Group nodes by fusion groups
            const fusionGroups = {};
            
            // First, check if fusionInfo exists and has data
            if (Object.keys(fusionInfo).length > 0) {
                graphData.nodes.forEach(node => {
                    if (fusionInfo[node.id] && fusionInfo[node.id].includes('Fused')) {
                        // Use a simpler fusion key to group related nodes
                        const fusionKey = fusionInfo[node.id].split(' ')[0];
                        if (!fusionGroups[fusionKey]) {
                            fusionGroups[fusionKey] = [];
                        }
                        fusionGroups[fusionKey].push(node.id);
                    }
                });
            }
            
            // Draw fusion group bounding boxes
            Object.entries(fusionGroups).forEach(([fusionKey, nodeIds]) => {
                if (nodeIds.length > 1) { // Only draw box if multiple nodes are fused
                    // Calculate bounding box coordinates
                    let minX = Infinity, minY = Infinity;
                    let maxX = -Infinity, maxY = -Infinity;
                    
                    nodeIds.forEach(nodeId => {
                        const pos = nodePositions[nodeId];
                        if (pos) {
                            minX = Math.min(minX, pos.x - nodeRadius);
                            minY = Math.min(minY, pos.y - nodeRadius - 20); // Include label space
                            maxX = Math.max(maxX, pos.x + nodeRadius);
                            maxY = Math.max(maxY, pos.y + nodeRadius);
                        }
                    });
                    
                    // Add padding to bounding box
                    const padding = 10;
                    minX -= padding;
                    minY -= padding;
                    maxX += padding;
                    maxY += padding;
                    
                    // Draw bounding box
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', minX);
                    rect.setAttribute('y', minY);
                    rect.setAttribute('width', maxX - minX);
                    rect.setAttribute('height', maxY - minY);
                    rect.setAttribute('fill', 'rgba(240, 147, 251, 0.2)'); // Light purple background
                    rect.setAttribute('stroke', '#f093fb');
                    rect.setAttribute('stroke-width', '2');
                    rect.setAttribute('stroke-dasharray', '5,5');
                    svg.appendChild(rect);
                    
                    // Add fusion group label
                    const groupText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    groupText.setAttribute('x', minX + 5);
                    groupText.setAttribute('y', minY - 5);
                    groupText.setAttribute('font-size', '10');
                    groupText.setAttribute('fill', '#663399');
                    groupText.setAttribute('font-weight', 'bold');
                    groupText.textContent = `Fused Group`;
                    svg.appendChild(groupText);
                }
            });
            
            // Append SVG to container
            container.appendChild(svg);
        }

        // Update fusion stats and Jittor fusion details
        function updateFusionStats(stats) {
            if (!stats) return;
            
            const statValues = document.querySelectorAll('.stat-value');
            statValues[0].textContent = stats.total_ops;
            statValues[1].textContent = stats.fused_ops;
            statValues[2].textContent = `${stats.fusion_rate.toFixed(1)}%`;
            
            // Add Jittor fusion details to the fusion tab
            const fusionTab = document.getElementById('fusion-tab');
            let detailsContainer = fusionTab.querySelector('.fusion-details');
            if (!detailsContainer) {
                detailsContainer = document.createElement('div');
                detailsContainer.className = 'fusion-details';
                detailsContainer.style.marginTop = '20px';
                detailsContainer.style.padding = '20px';
                detailsContainer.style.background = 'white';
                detailsContainer.style.borderRadius = '10px';
                fusionTab.appendChild(detailsContainer);
            }
            
            // Add fusion visualization to fusion tab
            let fusionVisualization = fusionTab.querySelector('.fusion-visualization');
            if (!fusionVisualization) {
                fusionVisualization = document.createElement('div');
                fusionVisualization.className = 'fusion-visualization';
                fusionVisualization.style.marginTop = '20px';
                fusionVisualization.style.padding = '20px';
                fusionVisualization.style.background = 'white';
                fusionVisualization.style.borderRadius = '10px';
                // Insert before fusion-stats
                const fusionStats = fusionTab.querySelector('.fusion-stats');
                if (fusionStats) {
                    fusionTab.insertBefore(fusionVisualization, fusionStats);
                } else {
                    fusionTab.appendChild(fusionVisualization);
                }
            }
            
            // Render fusion groups visualization
            renderFusionVisualization(stats.fusion_info, fusionVisualization);
            
            detailsContainer.innerHTML = `
                <h3>Jittor算子融合统计</h3>
                <h4>Jittor融合技术:</h4>
                <ul>
                    <li><strong>Kernel Fusion</strong> - 将多个操作合并为单个CUDA内核</li>
                    <li><strong>Memory Fusion</strong> - 通过重用缓冲区减少内存访问</li>
                    <li><strong>Loop Fusion</strong> - 合并嵌套循环以提高缓存利用率</li>
                </ul>
                <h4>性能提升:</h4>
                <ul>
                    <li>减少内存带宽使用</li>
                    <li>降低内核启动开销</li>
                    <li>提高缓存局部性</li>
                    <li>提升整体吞吐量</li>
                </ul>
                <h4>融合详情:</h4>
                <ul>
                    ${Object.entries(stats.fusion_info || {}).map(([op, desc]) => `<li>${op}: ${desc}</li>`).join('')}
                </ul>
            `;
        }
        
        // Render fusion groups visualization
        function renderFusionVisualization(fusionInfo, container) {
            container.innerHTML = '<h3>算子融合可视化</h3>';
            
            if (!fusionInfo || Object.keys(fusionInfo).length === 0) {
                const placeholder = document.createElement('div');
                placeholder.style.padding = '40px';
                placeholder.style.textAlign = 'center';
                placeholder.style.color = '#666';
                placeholder.style.fontSize = '16px';
                placeholder.style.fontFamily = 'Arial, sans-serif';
                placeholder.textContent = '训练开始后将显示算子融合效果';
                container.appendChild(placeholder);
                return;
            }
            
            // Group fused operators by fusion type
            const fusionGroups = {};
            Object.entries(fusionInfo).forEach(([op, info]) => {
                // Skip non-fused operators
                if (info.includes('not fused')) {
                    return;
                }
                
                // Extract fusion type from the info string
                let fusionType = 'Unknown';
                if (info.includes('kernel fusion')) {
                    fusionType = 'Kernel Fusion';
                } else if (info.includes('Memory fusion')) {
                    fusionType = 'Memory Fusion';
                } else if (info.includes('automatic fusion')) {
                    fusionType = 'Automatic Fusion';
                }
                
                if (!fusionGroups[fusionType]) {
                    fusionGroups[fusionType] = [];
                }
                fusionGroups[fusionType].push({ op, info });
            });
            
            // Create SVG for fusion visualization
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '400');
            svg.style.background = '#f8f9fa';
            svg.style.borderRadius = '8px';
            svg.style.marginTop = '20px';
            svg.style.overflow = 'auto';
            
            // Position fusion groups
            let yOffset = 40;
            const xOffset = 40;
            const groupWidth = 1000; // Increased width to prevent text overflow
            const groupHeight = 100; // Increased height for better spacing
            const padding = 30; // Increased padding
            
            Object.entries(fusionGroups).forEach(([fusionType, operators]) => {
                // Draw group box
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', xOffset);
                rect.setAttribute('y', yOffset);
                rect.setAttribute('width', groupWidth);
                rect.setAttribute('height', groupHeight);
                rect.setAttribute('fill', 'rgba(240, 147, 251, 0.2)');
                rect.setAttribute('stroke', '#f093fb');
                rect.setAttribute('stroke-width', '2');
                rect.setAttribute('stroke-dasharray', '5,5');
                svg.appendChild(rect);
                
                // Add group label
                const groupText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                groupText.setAttribute('x', xOffset + 10);
                groupText.setAttribute('y', yOffset + 30);
                groupText.setAttribute('font-size', '16px'); // Increased font size
                groupText.setAttribute('fill', '#663399');
                groupText.setAttribute('font-weight', 'bold');
                groupText.setAttribute('font-family', 'Arial, sans-serif'); // Academic font
                groupText.textContent = `融合类型: ${fusionType}`;
                svg.appendChild(groupText);
                
                // Add operators inside the group
                operators.forEach(({ op, info }, index) => {
                    const opX = xOffset + 30 + (index % 4) * 240; // Adjusted spacing for 4 operators per row
                    const opY = yOffset + 70;
                    
                    // Draw operator circle
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', opX);
                    circle.setAttribute('cy', opY);
                    circle.setAttribute('r', 15); // Increased circle size
                    circle.setAttribute('fill', '#667eea');
                    circle.setAttribute('stroke', '#333');
                    circle.setAttribute('stroke-width', '1');
                    svg.appendChild(circle);
                    
                    // Add operator label
                    const opText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    opText.setAttribute('x', opX);
                    opText.setAttribute('y', opY - 20);
                    opText.setAttribute('text-anchor', 'middle');
                    opText.setAttribute('font-size', '12px'); // Increased font size
                    opText.setAttribute('fill', '#333');
                    opText.setAttribute('font-family', 'Arial, sans-serif'); // Academic font
                    const displayOp = op.length > 20 ? op.substring(0, 20) + '...' : op;
                    opText.textContent = displayOp;
                    svg.appendChild(opText);
                    
                    // Add tooltip
                    const tooltip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    tooltip.textContent = info;
                    circle.appendChild(tooltip);
                });
                
                yOffset += groupHeight + padding;
            });
            
            // Adjust SVG height based on content
            svg.setAttribute('height', yOffset + 20);
            
            container.appendChild(svg);
        }

        // Poll graph data
        let graphPollInterval;
        function startGraphPolling() {
            graphPollInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/graph');
                    const data = await response.json();
                    
                    if (data.computation_graph) {
                        const fusionInfo = data.fusion_stats ? data.fusion_stats.fusion_info : {};
                        renderGraph(data.computation_graph, fusionInfo);
                    }
                    
                    if (data.fusion_stats) {
                        updateFusionStats(data.fusion_stats);
                    }
                } catch (error) {
                    console.error('Error fetching graph data:', error);
                }
            }, 2000);
        }
        
        function stopGraphPolling() {
            if (graphPollInterval) {
                clearInterval(graphPollInterval);
                graphPollInterval = null;
            }
        }
        
        // Draw loss curve
        function drawLossCurve(history) {
            const canvas = document.getElementById('loss-chart');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // If no history, return
            if (history.epochs.length === 0) {
                return;
            }
            
            // Set up chart dimensions
            const margin = 50;
            const chartWidth = canvas.width - 2 * margin;
            const chartHeight = canvas.height - 2 * margin;
            
            // Get total epochs from training status
            const totalEpochs = trainingStatus.total_epochs || history.epochs[history.epochs.length - 1];
            
            // Fixed y-axis for loss: 0 to 2.0
            const maxLoss = 2.0;
            const minLoss = 0.0;
            
            // Normalize values to 0-1 range for chart
            const normalizeLoss = (value) => (value - minLoss) / (maxLoss - minLoss + 0.0001);
            
            // Draw grid
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = margin + i * chartHeight / 5;
                ctx.beginPath();
                ctx.moveTo(margin, y);
                ctx.lineTo(canvas.width - margin, y);
                ctx.stroke();
            }
            
            // Draw axes
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, canvas.height - margin);
            ctx.lineTo(canvas.width - margin, canvas.height - margin);
            ctx.stroke();
            
            // Draw loss curve
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 3;
            ctx.beginPath();
            history.epochs.forEach((epoch, index) => {
                const x = margin + (epoch / totalEpochs) * chartWidth;
                const y = margin + chartHeight - normalizeLoss(history.loss[index]) * chartHeight;
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
            
            // Add x-axis labels (epochs)
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial'; // Smaller font for axis labels
            ctx.textAlign = 'center';
            for (let i = 0; i <= 5; i++) {
                const epoch = Math.round(i * totalEpochs / 5);
                const x = margin + i * chartWidth / 5;
                ctx.fillText(epoch, x, canvas.height - margin + 25);
            }
            ctx.font = '14px Arial'; // Larger font for axis title
            ctx.textAlign = 'left';
            ctx.fillText('Epoch', canvas.width - margin - 50, canvas.height - margin + 35);
            
            // Add y-axis labels (Loss)
            ctx.textAlign = 'right';
            ctx.font = '12px Arial'; // Smaller font for axis labels
            for (let i = 0; i <= 5; i++) {
                const lossValue = minLoss + (maxLoss - minLoss) * (i / 5);
                const y = margin + chartHeight - (i * chartHeight / 5);
                ctx.fillText(lossValue.toFixed(2), margin - 15, y + 5);
            }
            ctx.font = '14px Arial'; // Larger font for axis title
            ctx.fillText('Loss', margin - 50, margin + 30);
        }
        
        // Draw accuracy curve
        function drawAccuracyCurve(history) {
            const canvas = document.getElementById('acc-chart');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // If no history, return
            if (history.epochs.length === 0) {
                return;
            }
            
            // Set up chart dimensions
            const margin = 50;
            const chartWidth = canvas.width - 2 * margin;
            const chartHeight = canvas.height - 2 * margin;
            
            // Get total epochs from training status
            const totalEpochs = trainingStatus.total_epochs || history.epochs[history.epochs.length - 1];
            
            // Fixed y-axis for accuracy: start from slightly below initial value
            const initialAcc = Math.min(...history.acc);
            const maxAcc = 1.0;
            const minAcc = Math.max(0, initialAcc - 0.1); // Start slightly below initial value
            
            // Normalize values to 0-1 range for chart
            const normalizeAcc = (value) => (value - minAcc) / (maxAcc - minAcc + 0.0001);
            
            // Draw grid
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = margin + i * chartHeight / 5;
                ctx.beginPath();
                ctx.moveTo(margin, y);
                ctx.lineTo(canvas.width - margin, y);
                ctx.stroke();
            }
            
            // Draw axes
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, canvas.height - margin);
            ctx.lineTo(canvas.width - margin, canvas.height - margin);
            ctx.stroke();
            
            // Draw accuracy curve
            ctx.strokeStyle = '#4ecdc4';
            ctx.lineWidth = 3;
            ctx.beginPath();
            history.epochs.forEach((epoch, index) => {
                const x = margin + (epoch / totalEpochs) * chartWidth;
                const y = margin + chartHeight - normalizeAcc(history.acc[index]) * chartHeight;
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
            
            // Add x-axis labels (epochs)
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial'; // Smaller font for axis labels
            ctx.textAlign = 'center';
            for (let i = 0; i <= 5; i++) {
                const epoch = Math.round(i * totalEpochs / 5);
                const x = margin + i * chartWidth / 5;
                ctx.fillText(epoch, x, canvas.height - margin + 25);
            }
            ctx.font = '14px Arial'; // Larger font for axis title
            ctx.textAlign = 'left';
            ctx.fillText('Epoch', canvas.width - margin - 50, canvas.height - margin + 35);
            
            // Add y-axis labels (Accuracy)
            ctx.textAlign = 'right';
            ctx.font = '12px Arial'; // Smaller font for axis labels
            for (let i = 0; i <= 5; i++) {
                const accValue = minAcc + (maxAcc - minAcc) * (i / 5);
                const y = margin + chartHeight - (i * chartHeight / 5);
                ctx.fillText(accValue.toFixed(2), margin - 15, y + 5);
            }
            ctx.font = '14px Arial'; // Larger font for axis title
            ctx.fillText('Accuracy', margin - 70, margin + 30);
        }

        // Training functionality
        const trainBtn = document.getElementById('train_btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusDiv = document.getElementById('status');
        const progressBar = document.getElementById('progress_bar');
        
        // Training history for chart
        let trainingHistory = {
            epochs: [],
            loss: [],
            acc: []
        };
        
        // Training status for chart axis
        let trainingStatus = {
            total_epochs: 200 // Default value, will be updated from API
        };

        trainBtn.addEventListener('click', async () => {
            trainBtn.disabled = true;
            stopBtn.disabled = false;
            statusDiv.innerHTML = '正在启动训练...';
            statusDiv.className = 'status running';
            
            // Reset training history
            trainingHistory = {
                epochs: [],
                loss: [],
                acc: []
            };
            
            // Clear canvases
            const lossCanvas = document.getElementById('loss-chart');
            const lossCtx = lossCanvas.getContext('2d');
            lossCtx.clearRect(0, 0, lossCanvas.width, lossCanvas.height);
            
            const accCanvas = document.getElementById('acc-chart');
            const accCtx = accCanvas.getContext('2d');
            accCtx.clearRect(0, 0, accCanvas.width, accCanvas.height);

            const data = {
                model_name: document.getElementById('model_name').value,
                dataset_name: document.getElementById('dataset_name').value,
                hidden_dim: parseInt(document.getElementById('hidden_dim').value),
                num_layers: parseInt(document.getElementById('num_layers').value),
                heads: parseInt(document.getElementById('heads').value),
                dropout: parseFloat(document.getElementById('dropout').value),
                epochs: parseInt(document.getElementById('epochs').value)
            };

            try {
                const response = await fetch('/api/train', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error('训练启动失败');
                }
                
                // Start polling graph data
                startGraphPolling();

                // Poll status with higher frequency for real-time updates
                const interval = setInterval(async () => {
                    const statusResponse = await fetch('/api/status');
                    const status = await statusResponse.json();

                    if (status.running) {
                        statusDiv.innerHTML = `训练进行中... Epoch ${status.epoch}/${status.total_epochs}, Loss: ${status.loss.toFixed(4)}, Acc: ${status.acc.toFixed(4)}`;
                        const progress = (status.epoch / status.total_epochs) * 100;
                        progressBar.style.width = `${progress}%`;
                        progressBar.innerHTML = `${progress.toFixed(1)}%`;
                        
                        // Update training status for chart
                        trainingStatus = status;
                        
                        // Record training history
                        if (!trainingHistory.epochs.includes(status.epoch)) {
                            trainingHistory.epochs.push(status.epoch);
                            trainingHistory.loss.push(status.loss);
                            trainingHistory.acc.push(status.acc);
                            
                            // Update charts in real-time
                            drawLossCurve(trainingHistory);
                            drawAccuracyCurve(trainingHistory);
                        }
                    } else {
                        clearInterval(interval);
                        stopGraphPolling();
                        trainBtn.disabled = false;
                        stopBtn.disabled = true;

                        if (status.error) {
                            statusDiv.innerHTML = `错误: ${status.error}`;
                            statusDiv.className = 'status error';
                        } else {
                            // Draw final charts
                        drawLossCurve(trainingHistory);
                        drawAccuracyCurve(trainingHistory);
                            
                            statusDiv.innerHTML = `训练完成. 测试准确率: ${status.acc.toFixed(4)}`;
                            statusDiv.className = 'status completed';
                            progressBar.style.width = '100%';
                            progressBar.innerHTML = '100%';
                        }
                    }
                }, 500); // Update every 500ms for real-time chart updates

            } catch (error) {
                    trainBtn.disabled = false;
                    statusDiv.innerHTML = `错误: ${error.message}`;
                    statusDiv.className = 'status error';
                    stopGraphPolling();
                }
        });

        // Stop button functionality
        stopBtn.addEventListener('click', async () => {
            try {
                await fetch('/api/stop-training', { method: 'POST' });
                stopBtn.disabled = true;
                trainBtn.disabled = false;
                statusDiv.innerHTML = '训练已停止';
                statusDiv.className = 'status error';
                stopGraphPolling();
            } catch (error) {
                console.error('Error stopping training:', error);
            }
        });
    </script>
</body>
</html>
